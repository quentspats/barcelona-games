<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE9C9"/>
      <stop offset="1" stop-color="#FFD7A6"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3FA5C4"/>
      <stop offset="1" stop-color="#176585"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F1D88A"/>
      <stop offset="1" stop-color="#E0B85F"/>
    </linearGradient>
    <pattern id="dots" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.2" fill="#B88E3F" opacity="0.45"/>
    </pattern>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="320" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="900" cy="180" r="100" fill="#F25C16"/>
  <circle cx="900" cy="180" r="100" fill="#FFD9A8" opacity="0.4"/>
  <!-- Skyline silhouette: Sagrada spires -->
  <g fill="#0E516F" opacity="0.85">
    <path d="M280 312 l8 -98 l8 98 z"/>
    <path d="M298 312 l9 -114 l9 114 z"/>
    <path d="M320 312 l10 -130 l10 130 z"/>
    <path d="M346 312 l11 -120 l11 120 z"/>
    <path d="M372 312 l9 -100 l9 100 z"/>
    <rect x="400" y="282" width="22" height="30"/>
    <rect x="430" y="270" width="14" height="42"/>
    <!-- Hotel Arts twins on right -->
    <rect x="1010" y="240" width="14" height="72"/>
    <rect x="1032" y="232" width="14" height="80"/>
  </g>

  <!-- Sea -->
  <rect y="320" width="1200" height="100" fill="url(#sea)"/>
  <g stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.55" fill="none">
    <path d="M40 358 q40 -10 80 0 t80 0 t80 0"/>
    <path d="M580 348 q40 -10 80 0 t80 0 t80 0"/>
  </g>

  <!-- Sand -->
  <rect y="420" width="1200" height="210" fill="url(#sand)"/>
  <rect y="420" width="1200" height="210" fill="url(#dots)"/>

  <!-- Big script logo at top -->
  <g font-family="'Caveat', 'Brush Script MT', cursive" fill="#0F1B23">
    <text x="600" y="120" text-anchor="middle" font-size="80" font-weight="700">Barcelona Games</text>
    <text x="600" y="158" text-anchor="middle" font-size="22" letter-spacing="6" fill="#52677A" font-family="'Inter', sans-serif" font-weight="600">SAT · 18 JUL 2026 · BARCELONETA BEACH</text>
  </g>

  <!-- Headline (serif italic) -->
  <g font-family="'Playfair Display', Georgia, serif" fill="#0F1B23">
    <text x="600" y="500" text-anchor="middle" font-size="64" font-style="italic" font-weight="900">Beach games, not small talk.</text>
    <text x="600" y="555" text-anchor="middle" font-size="28" fill="#2A3E4D" font-family="'Inter', sans-serif" font-weight="500">5 teams · 4 games · 30 spots · solo or with friends</text>
  </g>

  <!-- Sunset bar at bottom -->
  <rect y="610" width="1200" height="20" fill="#F25C16"/>
</svg>
